version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: negosphere-postgres
    environment:
      POSTGRES_DB: negosphere
      POSTGRES_USER: negouser
      POSTGRES_PASSWORD: negopassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U negouser -d negosphere"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: negosphere-redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: negosphere-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://negouser:negopassword@postgres:5432/negosphere
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ENABLE_LIVE_SCRAPING=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build: ./frontend
    container_name: negosphere-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
